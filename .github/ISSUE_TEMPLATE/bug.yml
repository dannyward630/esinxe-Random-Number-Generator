name: Bug report
description: Report incorrect output, portability trouble, or documentation errors.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: dropdown
    id: port
    attributes:
      label: Language port
      options:
        - Python
        - C
        - C++
        - C#
        - Ruby
        - JavaScript / TypeScript
        - Rust
        - Go
        - Java
        - Kotlin
        - Specification / documentation
        - Multiple ports
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 1.1.0 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the seed, structured keys, expected output, and actual output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, architecture, compiler/runtime, and relevant tool versions.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I confirmed this is not a request for cryptographic or security-sensitive randomness.
          required: true
        - label: I searched existing issues for the same problem.
          required: true
